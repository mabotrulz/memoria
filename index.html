128|function startGame() {
129|  initAudio();
130|  document.getElementById('startOverlay').classList.add('hidden');
131|  document.getElementById('winOverlay').classList.remove('active');
132|  matched=0; attempts=0; flipped=[]; lock=false;
133|  document.getElementById('scoreDisplay').textContent='0/8 ✓';
134|  document.getElementById('attemptsDisplay').textContent='0 tentativas';
135|  
136|  // Pick 8 random Pokemon
137|  const picked = shuffle([...POKEMON]).slice(0,8);
138|  cards = shuffle([...picked, ...picked]).map((p,i)=>({...p,id:i}));
139|  
140|  const grid = document.getElementById('grid');
141|  grid.innerHTML = '';
142|  cards.forEach((c,i) => {
143|    const div = document.createElement('div');
144|    div.className = 'card';
145|    div.dataset.idx = i;
146|    div.innerHTML = `<div class="card-inner"><div class="card-front"><img src="assets/${c.file}" alt="${c.name}"></div><div class="card-back"></div></div>`;
147|    div.addEventListener('click', () => flipCard(i));
148|    grid.appendChild(div);
149|  });

155|function flipCard(idx) {
156|  if (lock) return;
157|  const el = document.querySelectorAll('.card')[idx];
158|  if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;
159|  
160|  sfxFlip();
161|  el.classList.add('flipped');
162|  flipped.push(idx);
163|  
164|  if (flipped.length === 2) {
165|    lock = true;
166|    attempts++;
167|    document.getElementById('attemptsDisplay').textContent = attempts + ' tentativas';
168|    checkMatch();
169|  }
170|}

172|function checkMatch() {
173|  const [a,b] = flipped;
174|  if (cards[a].name === cards[b].name) {
175|    // Match!
176|    setTimeout(() => {
177|      sfxMatch();
178|      const els = document.querySelectorAll('.card');
179|      els[a].classList.add('matched');
180|      els[b].classList.add('matched');
181|      matched++;
182|      document.getElementById('scoreDisplay').textContent = matched + '/8 ✓';
183|      
184|      // Show Pokemon reveal
185|      const poke = cards[a];
186|      document.getElementById('revealImg').src = 'assets/' + poke.file;
187|      document.getElementById('revealName').textContent = poke.name;
188|      document.getElementById('revealOverlay').classList.add('active');
189|      speak(poke.name, 'en-US', () => {
190|        setTimeout(() => {
191|          document.getElementById('revealOverlay').classList.remove('active');
192|          flipped = []; lock = false;
193|          
194|          if (matched === 8) {
195|            sfxWin();
196|            document.getElementById('finalStats').textContent = 'Completaste em ' + attempts + ' tentativas!';
197|            document.getElementById('winOverlay').classList.add('active');
198|            speak('Parabéns! Completaste o jogo da memória!');
199|          }
200|        }, 400);
201|      });
202|    }, 300);
203|  } else {
204|    setTimeout(() => {
205|      sfxWrong();
206|      const els = document.querySelectorAll('.card');
207|      els[a].classList.remove('flipped');
208|      els[b].classList.remove('flipped');
209|      flipped = []; lock = false;
