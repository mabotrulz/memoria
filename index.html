<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memória Pokémon</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; font-family:'Segoe UI',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100dvh; overflow:hidden; user-select:none; touch-action:manipulation; }
  .game { width:100vw; height:100dvh; max-width:600px; background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460); display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header { text-align:center; padding:8px 12px 4px; flex-shrink:0; font-size:clamp(14px,3vw,18px); color:#f1c40f; font-weight:900; letter-spacing:1px; display:flex; justify-content:space-between; }
  .header span { font-size:clamp(11px,2.5vw,14px); color:#888; font-weight:400; }
  .header .score { color:#4ecca3; }
  .grid { flex:1; display:grid; grid-template-columns:repeat(4,1fr); gap:clamp(4px,1.5vw,8px); padding:8px; align-content:center; }
  .card { aspect-ratio:1; border-radius:10px; cursor:pointer; perspective:800px; }
  .card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .card.flipped .card-inner { transform:rotateY(180deg); }
  .card.matched .card-inner { transform:rotateY(180deg); }
  .card.removed { visibility:hidden; pointer-events:none; }
  .card-front, .card-back { position:absolute; inset:0; border-radius:10px; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; }
  .card-back { background:linear-gradient(135deg,#e74c3c,#c0392b); border:2px solid #ff6b6b; font-size:clamp(24px,6vw,40px); }
  .card-back::after { content:'?'; font-size:clamp(28px,7vw,48px); font-weight:900; color:rgba(255,255,255,0.3); }
  .card-front { background:#16213e; border:2px solid #4ecca3; transform:rotateY(180deg); }
  .card-front img { width:80%; height:80%; object-fit:contain; }
  
  .card.matched .card-front { border-color:#f1c40f; background:rgba(241,196,15,0.1); }
  .card:not(.flipped):not(.matched):hover .card-inner { transform:scale(1.03); }
  
  /* Match reveal */
  .reveal { position:absolute; inset:0; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; background:rgba(10,10,20,0.9); opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .reveal.active { opacity:1; pointer-events:all; }
  .reveal img { width:clamp(120px,30vw,220px); height:clamp(120px,30vw,220px); object-fit:contain; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .reveal .name { font-size:clamp(20px,5vw,36px); font-weight:700; color:#f1c40f; margin-top:8px; }
  @keyframes popIn { 0%{transform:scale(0) rotate(-20deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
  
  /* Win overlay */
  .win-overlay { position:absolute; inset:0; z-index:200; background:rgba(15,52,96,0.93); display:flex; flex-direction:column; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:opacity 0.5s; padding:30px; text-align:center; }
  .win-overlay.active { opacity:1; pointer-events:all; }
  .win-overlay h2 { font-size:clamp(28px,8vw,48px); color:#4ecca3; margin:4px 0; }
  .win-overlay .sub { color:#aaa; font-size:clamp(14px,3vw,18px); margin-bottom:12px; }
  .win-overlay .stats { color:#888; font-size:clamp(12px,2.5vw,14px); margin-bottom:16px; }
  .win-overlay button { padding:12px 36px; font-size:clamp(14px,3vw,18px); font-weight:700; background:#4ecca3; color:#1a1a2e; border:none; border-radius:12px; cursor:pointer; letter-spacing:1px; }
  
  .start-overlay { position:absolute; inset:0; z-index:300; background:rgba(15,52,96,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; text-align:center; transition:opacity 0.5s; }
  .start-overlay.hidden { opacity:0; pointer-events:none; }
  .start-overlay .logo { font-size:clamp(50px,14vw,80px); margin-bottom:8px; }
  .start-overlay h2 { font-size:clamp(24px,7vw,40px); color:#f1c40f; margin-bottom:4px; }
  .start-overlay .start-btn { padding:16px 48px; font-size:clamp(18px,4vw,24px); font-weight:700; background:linear-gradient(135deg,#f1c40f,#f39c12); color:#1a1a2e; border:none; border-radius:16px; cursor:pointer; letter-spacing:2px; box-shadow:0 6px 25px rgba(241,196,15,0.3); margin-top:16px; }
  
  @media (max-width:400px) {
    .grid { gap:3px; padding:4px; }
    .card-back { border-width:1.5px; }
  }
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <span>🃏 Memória</span>
    <span class="score" id="scoreDisplay">0/8 ✓</span>
    <span id="attemptsDisplay">0 tentativas</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="reveal" id="revealOverlay">
    <img id="revealImg" src="" alt="">
    <div class="name" id="revealName"></div>
  </div>
  <div class="win-overlay" id="winOverlay">
    <h2>🏆 Parabéns!</h2>
    <div class="sub">Completaste o jogo da memória!</div>
    <div class="stats" id="finalStats"></div>
    <button onclick="startGame()">Jogar outra vez →</button>
  </div>
  <div class="start-overlay" id="startOverlay">
    <div class="logo"><img src="assets/icon.png" style="width:clamp(60px,16vw,120px);height:clamp(60px,16vw,120px);border-radius:16px"></div>
    <h2>Memória Pokémon</h2>
    <p>Encontra os pares de Pokémon!</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>

];

let cards = [], flipped = [], matched = 0, attempts = 0, lock = false;
let audioInit = false, audioCtx = null;

function initAudio() {
  if (audioInit) return;
  audioInit = true;
  try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if (audioCtx.state==='suspended') audioCtx.resume(); } catch(e){}
}

function speak(text, lang, cb) {
  if (!window.speechSynthesis) { if(cb)cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'pt-PT'; u.rate = 0.85;
  if (cb) u.onend = cb;
  window.speechSynthesis.speak(u);
}

function sfxFlip() {
  try { if(!audioCtx)return; var o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(600,audioCtx.currentTime); o.frequency.linearRampToValueAtTime(900,audioCtx.currentTime+0.1); g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15); o.connect(g);g.connect(audioCtx.destination); o.start();o.stop(audioCtx.currentTime+0.15); }catch(e){}
}
function sfxMatch() {
  try { if(!audioCtx)return; var o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(523,audioCtx.currentTime); o.frequency.linearRampToValueAtTime(784,audioCtx.currentTime+0.2); o.frequency.linearRampToValueAtTime(1047,audioCtx.currentTime+0.4); g.gain.setValueAtTime(0.2,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5); o.connect(g);g.connect(audioCtx.destination); o.start();o.stop(audioCtx.currentTime+0.5); }catch(e){}
}
function sfxWrong() {
  try { if(!audioCtx)return; var o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='square'; o.frequency.value=250; g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2); o.connect(g);g.connect(audioCtx.destination); o.start();o.stop(audioCtx.currentTime+0.2); }catch(e){}
}
function sfxWin() {
  try { if(!audioCtx)return; var o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(523,audioCtx.currentTime); o.frequency.linearRampToValueAtTime(659,audioCtx.currentTime+0.15); o.frequency.linearRampToValueAtTime(784,audioCtx.currentTime+0.3); o.frequency.linearRampToValueAtTime(1047,audioCtx.currentTime+0.5); g.gain.setValueAtTime(0.2,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.7); o.connect(g);g.connect(audioCtx.destination); o.start();o.stop(audioCtx.currentTime+0.7); }catch(e){}
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

function startGame() {
  initAudio();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.remove('active');
  matched=0; attempts=0; flipped=[]; lock=false;
  document.getElementById('scoreDisplay').textContent='0/8 ✓';
  document.getElementById('attemptsDisplay').textContent='0 tentativas';
  
  // Pick 8 random Pokemon
  const picked = shuffle([...POKEMON]).slice(0,8);
  cards = shuffle([...picked, ...picked]).map((p,i)=>({...p,id:i}));
  
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((c,i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.idx = i;
    div.innerHTML = `<div class="card-inner"><div class="card-front"><img src="assets/${c.file}" alt="${c.name}"></div><div class="card-back"></div></div>`;
    div.addEventListener('click', () => flipCard(i));
    grid.appendChild(div);
  });
  
  // Speak first hint
  setTimeout(() => speak('Encontra os pares de Pokémon!', 'pt-PT'), 400);
}

function flipCard(idx) {
  if (lock) return;
  const el = document.querySelectorAll('.card')[idx];
  if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  
  sfxFlip();
  el.classList.add('flipped');
  flipped.push(idx);
  
  if (flipped.length === 2) {
    lock = true;
    attempts++;
    document.getElementById('attemptsDisplay').textContent = attempts + ' tentativas';
    checkMatch();
  }
}

function checkMatch() {
  const [a,b] = flipped;
  if (cards[a].name === cards[b].name) {
    // Match!
    setTimeout(() => {
      sfxMatch();
      const els = document.querySelectorAll('.card');
      els[a].classList.add('matched');
      els[b].classList.add('matched');
      matched++;
      document.getElementById('scoreDisplay').textContent = matched + '/8 ✓';
      
      // Show Pokemon reveal
      const poke = cards[a];
      document.getElementById('revealImg').src = 'assets/' + poke.file;
      document.getElementById('revealName').textContent = poke.name;
      document.getElementById('revealOverlay').classList.add('active');
      speak(poke.name, 'en-US', () => {
        setTimeout(() => {
          document.getElementById('revealOverlay').classList.remove('active');
          flipped = []; lock = false;
          
          if (matched === 8) {
            sfxWin();
            document.getElementById('finalStats').textContent = 'Completaste em ' + attempts + ' tentativas!';
            document.getElementById('winOverlay').classList.add('active');
            speak('Parabéns! Completaste o jogo da memória!');
          }
        }, 400);
      });
    }, 300);
  } else {
    setTimeout(() => {
      sfxWrong();
      const els = document.querySelectorAll('.card');
      els[a].classList.remove('flipped');
      els[b].classList.remove('flipped');
      flipped = []; lock = false;
    }, 800);
  }
}
